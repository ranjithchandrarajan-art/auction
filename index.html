<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Dealer Auction Portal</title>

<style>

/* PAGE RESET */

body{
margin:0;
background:#364586;
font-family:Arial;
overflow:hidden;
}

/* TOP BRAND BAR */

.brandbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:55px;
  background:#364586;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;   /* center title */
  font-weight:600;
  z-index:999;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
}

/* BOTTOM BRAND BAR */

.footerbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:55px;
background:#364586;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
z-index:999;
box-shadow:0 -2px 6px rgba(0,0,0,.5);
}

/* IFRAME */

iframe{
position:absolute;
top:55px;
left:0;
width:100vw;
height:calc(100dvh - 110px);
border:none;
}

/* MOBILE */

@media(max-width:768px){

.brandbar{
height:50px;
font-size:14px;
}

.footerbar{
height:50px;
font-size:13px;
}

iframe{
top:50px;
height:calc(100dvh - 100px);
}

}

@keyframes spin {
  to { transform: rotate(360deg); }
}
  
</style>

</head>

<body>

<!-- TOP BAR -->

<div class="brandbar">

  <!-- LEFT TITLE -->
  <span id="portalTitle">
    Dealer Auction Portal
    <span id="bidCountBadge"
      style="
        margin-left:10px;
        background:#28a745;
        padding:4px 8px;
        border-radius:12px;
        font-size:12px;
        display:none;
      ">
      0
    </span>
  </span>

  <!-- CENTER SEARCH (NEW) -->
  <input type="text"
       id="globalSearch"
       placeholder="Search Vehicle ID, Make, Year, KM..."
       onkeyup="sendSearchToIframe()"
       style="
         position:absolute;
         left:50%;
         transform:translateX(-50%);
         width:350px;
         max-width:40%;
         padding:6px 10px;
         border-radius:6px;
         border:none;
         outline:none;
         font-size:13px;
         opacity:0;
        visibility:hidden;
        transition:opacity .3s ease;
       ">

  <!-- RIGHT LOGOUT -->
  <button id="logoutBtn"
  style="
    position:absolute;
    right:20px;
    background:white;
    color:#364586;
    border:none;
    padding:6px 14px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
  ">
  Logout
</button>

</div>

<!-- APPS SCRIPT PORTAL -->

<iframe
src="https://script.google.com/macros/s/AKfycbzO9b6kRCVJFAZrRSWXuiDygekb_mMZS4CZGwmt8o57Ik5eh5gvlnLDEC2P1lRnmMTE/exec"
allowfullscreen>
</iframe>

<!-- BOTTOM BAR -->

<div class="footerbar">
© 2026 Dealer Auction Platform | Secure Dealer Environment
</div>

<!-- LOGOUT OVERLAY -->
<div id="logoutOverlay"
  style="
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    font-family:Arial;
    font-size:18px;
    z-index:2000;
    opacity:0;
    transition:opacity .4s ease;
  ">

  <div style="
      width:45px;
      height:45px;
      border:4px solid rgba(255,255,255,0.3);
      border-top:4px solid white;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:15px;
  "></div>

  Logging out...

</div>

<script>

window.onload = function(){

  var btn = document.getElementById("logoutBtn");
  var overlay = document.getElementById("logoutOverlay");
  var iframe = document.querySelector("iframe");
  var search = document.getElementById("globalSearch");

btn.onclick = function(){

  var search = document.getElementById("globalSearch");

  // 🔹 Hide search smoothly
  if(search){
    search.style.opacity = "0";
    search.style.visibility = "hidden";
    search.value = "";
  }

  // 🔹 Show logout overlay
  overlay.style.display = "flex";

  // 🔹 Hide overlay after iframe reload
  iframe.onload = function(){
    overlay.style.display = "none";
  };

  // 🔹 Reload iframe (returns to login screen)
  iframe.src = iframe.src;

};

</script>

<script>
window.addEventListener("message", function(event){
  console.log("Message received:", event.data);

  if(!event.data) return;

  var search = document.getElementById("globalSearch");
  var badge  = document.getElementById("bidCountBadge");

  /* 🔹 LOGIN SUCCESS */
  if(event.data.type === "LOGIN_SUCCESS"){
  var search = document.getElementById("globalSearch");
  if(search){
    search.style.visibility = "visible";
    search.style.opacity = "1";
  }
}

  /* 🔹 LOGOUT REQUEST */
  if(event.data.type === "LOGOUT_REQUEST"){
    if(search){
      search.style.display = "none";
      search.value = "";
    }
  }

  /* 🔹 BID COUNT */
  if(event.data.type === "BID_COUNT"){
    if(!badge) return;

    var count = event.data.count || 0;

    if(count > 0){
      badge.style.display = "inline-block";
      badge.innerText = count + " Bids";
    }else{
      badge.style.display = "none";
    }
  }

});
</script>
<script>
function sendSearchToIframe(){

  const iframe = document.querySelector("iframe");
  const value = document.getElementById("globalSearch").value;

  iframe.contentWindow.postMessage(
    { type: "GLOBAL_SEARCH", value: value },
    "*"
  );

}
</script>
</body>
</html>
