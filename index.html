<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dealer Auction Portal</title>

<style>

body{
  margin:0;
  background:#364586;
  font-family:Arial;
  overflow:hidden;
}

/* TOP BAR */
.brandbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:35px;
  background:#364586;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  z-index:1000;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
}

/* FOOTER */
.footerbar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  min-height:35px;
  background:#364586;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  z-index:999;
  box-shadow:0 -2px 6px rgba(0,0,0,.5);
  text-align:center;
  padding:8px 10px;
}

/* IFRAME */
iframe{
  position:absolute;
  top:35px;
  left:0;
  width:100vw;
  height:calc(100vh - 110px);
  border:none;
}

</style>
</head>

<body>

<div class="brandbar">
Dealer Auction Portal
</div>

<iframe
src="https://script.google.com/macros/s/AKfycbxSfTAJKu7bp_S9GfPN8UE2uLLIMfnMrzvs0wRMOuKPvPX9aghilQy6oeYH4buH_4DG/exec"
allowfullscreen>
</iframe>

<div class="footerbar">
© 2026 Dealer Auction Platform | Secure Dealer Environment
</div>

</body>
</html>
