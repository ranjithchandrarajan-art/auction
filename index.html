<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dealer Auction Portal</title>

<style>
body{
  margin:0;
  background:#364586;
  font-family:Arial;
  overflow:hidden;
}

/* TOP BAR */
.brandbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:55px;
  background:#364586;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  z-index:1000;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
}

/* LOGOUT */
#logoutBtn{
  position:absolute;
  right:20px;
  background:white;
  color:#364586;
  border:none;
  padding:6px 14px;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
}

/* FOOTER */
.footerbar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:55px;
  background:#364586;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  z-index:999;
  box-shadow:0 -2px 6px rgba(0,0,0,.5);
}

/* IFRAME */
iframe{
  position:absolute;
  top:55px;
  left:0;
  width:100vw;
  height:calc(100dvh - 110px);
  border:none;
  z-index:1;              /* ADD THIS */
}
</style>
</head>

<body>

<div class="brandbar">
  Dealer Auction Portal
  <button id="logoutBtn">Logout</button>
</div>

<iframe id="portalFrame"
src="https://script.google.com/macros/s/AKfycbzO9b6kRCVJFAZrRSWXuiDygekb_mMZS4CZGwmt8o57Ik5eh5gvlnLDEC2P1lRnmMTE/exec"
allowfullscreen></iframe>

<div class="footerbar">
© 2026 Dealer Auction Platform | Secure Dealer Environment
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const iframe = document.getElementById("portalFrame");
  const logoutBtn = document.getElementById("logoutBtn");

  // Initial state
  logoutBtn.style.display = "none";

  iframe.addEventListener("load", function(){

    const url = iframe.src;

    // If logout flag present → hide button
    if(url.includes("logout=true")){
      logoutBtn.style.display = "none";
    } else {
      // Normal load = assume logged in
      logoutBtn.style.display = "inline-block";
    }

  });

  logoutBtn.onclick = function(){

    const baseUrl = iframe.src.split("?")[0];
    iframe.src = baseUrl + "?logout=true";

  };

});
</script>
</body>
</html>
