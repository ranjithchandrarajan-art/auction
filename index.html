<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Dealer Auction Portal</title>

<style>

/* PAGE RESET */

body{
margin:0;
background:#364586;
font-family:Arial;
overflow:hidden;
}

/* TOP BRAND BAR */

.brandbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:55px;
  background:#364586;
  color:white;
  display:flex;
  align-items:center;
  justify-content: center;
  gap: 40px;
  padding:0 20px;
  font-weight:600;
  z-index:999;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
}

.brand-left{
  flex:1;
  text-align:left;
}

.brand-center{
  flex:1;
  text-align:center;
}

.brand-right{
  flex:1;
  text-align:right;
}

/* BOTTOM BRAND BAR */

.footerbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:55px;
background:#364586;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
z-index:999;
box-shadow:0 -2px 6px rgba(0,0,0,.5);
}

/* IFRAME */

iframe{
position:absolute;
top:55px;
left:0;
width:100vw;
height:calc(100dvh - 110px);
border:none;
}

/* MOBILE */

@media(max-width:768px){

.brandbar{
height:50px;
font-size:14px;
}

.footerbar{
height:50px;
font-size:13px;
}

iframe{
top:50px;
height:calc(100dvh - 100px);
}

}

@keyframes spin {
  to { transform: rotate(360deg); }
}
  
</style>

</head>

<body>

<!-- TOP BAR -->

<div class="brandbar">

  <div class="brand-left">
    <span id="portalTitle">
      Dealer Auction Portal
      <span id="bidCountBadge"
        style="
          margin-left:10px;
          background:#28a745;
          padding:4px 8px;
          border-radius:12px;
          font-size:12px;
          display:none;
        ">
        0
      </span>
    </span>
  </div>

  <div class="brand-center">
    <input type="text"
           id="globalSearch"
           placeholder="Search Vehicle ID, Make, Year, KM..."
           onkeyup="sendSearchToIframe()"
           style="
             width:350px;
             max-width:80%;
             padding:6px 10px;
             border-radius:6px;
             border:none;
             outline:none;
             font-size:13px;
             display:none;
           ">
  </div>

  <div class="brand-right">
    <button id="logoutBtn"
      style="
        background:white;
        color:#364586;
        border:none;
        padding:6px 14px;
        border-radius:6px;
        font-size:13px;
        cursor:pointer;
      ">
      Logout
    </button>
  </div>

</div>

<!-- APPS SCRIPT PORTAL -->

<iframe
src="https://script.google.com/macros/s/AKfycbzO9b6kRCVJFAZrRSWXuiDygekb_mMZS4CZGwmt8o57Ik5eh5gvlnLDEC2P1lRnmMTE/exec"
allowfullscreen>
</iframe>

<!-- BOTTOM BAR -->

<div class="footerbar">
© 2026 Dealer Auction Platform | Secure Dealer Environment
</div>

<!-- LOGOUT OVERLAY -->
<div id="logoutOverlay"
  style="
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    font-family:Arial;
    font-size:18px;
    z-index:2000;
    opacity:0;
    transition:opacity .4s ease;
  ">

  <div style="
      width:45px;
      height:45px;
      border:4px solid rgba(255,255,255,0.3);
      border-top:4px solid white;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:15px;
  "></div>

  Logging out...

</div>

<script>

window.onload = function(){

  var btn = document.getElementById("logoutBtn");
  var overlay = document.getElementById("logoutOverlay");
  var iframe = document.querySelector("iframe");
  var search = document.getElementById("globalSearch");

  /* Detect iframe load */
  iframe.onload = function(){

    try{
      // If iframe contains dashboard element, show search
      var innerDoc = iframe.contentWindow.document;

      if(innerDoc.getElementById("dashboard")){
        search.style.display = "inline-block";
      }else{
        search.style.display = "none";
      }

    }catch(e){
      // Cross origin safety fallback
      search.style.display = "none";
    }

    overlay.style.display = "none";
  };

  /* Logout Click */
  btn.onclick = function(){

    search.style.display = "none";
    search.value = "";

    overlay.style.display = "flex";

    iframe.src = iframe.src; // reload to login

  };

};
</script>

<script>
window.addEventListener("message", function(event){
  console.log("Message received:", event.data);

  if(!event.data) return;

  var search = document.getElementById("globalSearch");
  var badge  = document.getElementById("bidCountBadge");

  /* 🔹 LOGOUT REQUEST */
  if(event.data.type === "LOGOUT_REQUEST"){
    if(search){
      search.style.display = "none";
      search.value = "";
    }
  }

  /* 🔹 BID COUNT */
  if(event.data.type === "BID_COUNT"){
    if(!badge) return;

    var count = event.data.count || 0;

    if(count > 0){
      badge.style.display = "inline-block";
      badge.innerText = count + " Bids";
    }else{
      badge.style.display = "none";
    }
  }

});
</script>
<script>
function sendSearchToIframe(){

  const iframe = document.querySelector("iframe");
  const value = document.getElementById("globalSearch").value;

  iframe.contentWindow.postMessage(
    { type: "GLOBAL_SEARCH", value: value },
    "*"
  );

}
</script>
</body>
</html>
