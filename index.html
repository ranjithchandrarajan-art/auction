<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dealer Auction Portal</title>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }

body{
  background:#364586;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* ── TOP BAR ──────────────────────────────────────── */
.brandbar{
  position:fixed;
  top:0; left:0; width:100%;
  height:30px;
  background:#364586;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  z-index:1000;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
}

.bar-title{
  font-weight:700;
  font-size:13px;
  letter-spacing:.3px;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  white-space:nowrap;
}

/* Left and right button slots */
.bar-left, .bar-right{
  display:flex;
  align-items:center;
  gap:6px;
  z-index:1;
}

.bar-btn{
  padding:3px 10px;
  border-radius:5px;
  border:none;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  display:none; /* hidden until logged in */
  transition:filter .15s, transform .1s;
  white-space:nowrap;
}
.bar-btn:active{ transform:scale(.95); }

.btn-mybids{
  background:#10b981;
  color:white;
}
.btn-mybids:hover{ filter:brightness(1.1); }

.btn-logout{
  background:rgba(255,255,255,.18);
  color:white;
  border:1px solid rgba(255,255,255,.3) !important;
}
.btn-logout:hover{ background:rgba(255,255,255,.3); }

/* ── IFRAME ───────────────────────────────────────── */
iframe{
  position:absolute;
  top:30px;
  left:0;
  width:100vw;
  height:calc(100vh - 60px);
  border:none;
}

/* ── FOOTER ───────────────────────────────────────── */
.footerbar{
  position:fixed;
  bottom:0; left:0; width:100%;
  height:30px;
  background:#364586;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:600;
  z-index:999;
  box-shadow:0 -2px 6px rgba(0,0,0,.5);
}
</style>
</head>
<body>

<div class="brandbar">
  <div class="bar-left">
    <button class="bar-btn btn-mybids" id="btnMyBids" onclick="sendToIframe('ACTION_MY_BIDS')">
      📋 My Bids
    </button>
  </div>

  <div class="bar-title">Dealer Auction Portal</div>

  <div class="bar-right">
    <button class="bar-btn btn-logout" id="btnLogout" onclick="sendToIframe('ACTION_LOGOUT')">
      Logout
    </button>
  </div>
</div>

<iframe
  id="auctionFrame"
  src="https://script.google.com/macros/s/AKfycbxSfTAJKu7bp_S9GfPN8UE2uLLIMfnMrzvs0wRMOuKPvPX9aghilQy6oeYH4buH_4DG/exec"
  allowfullscreen>
</iframe>

<div class="footerbar">
  © 2026 Dealer Auction Platform | Secure Dealer Environment
</div>

<script>
var iframe = document.getElementById("auctionFrame");

/* Send command down into the iframe */
function sendToIframe(type){
  iframe.contentWindow.postMessage({type:type}, "*");
}

/* Listen for messages coming UP from the iframe */
window.addEventListener("message", function(e){
  var type = (e.data && e.data.type) ? e.data.type : e.data;

  if(type === "DEALER_LOGGED_IN"){
    document.getElementById("btnMyBids").style.display = "inline-block";
    document.getElementById("btnLogout").style.display = "inline-block";
  }
  if(type === "DEALER_LOGGED_OUT"){
    document.getElementById("btnMyBids").style.display = "none";
    document.getElementById("btnLogout").style.display = "none";
  }
  if(type === "OPEN_MODAL")  document.body.style.overflow = "hidden";
  if(type === "CLOSE_MODAL") document.body.style.overflow = "";
});
</script>
</body>
</html>
