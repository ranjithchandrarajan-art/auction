<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Dealer Auction Portal</title>


<style>

/* PAGE RESET */

body{

margin:0;

background:#000;

font-family:Arial;

overflow:hidden;

}


/* TOP BRAND BAR */

.brandbar{

position:fixed;

top:0;

left:0;

width:100%;

height:55px;

background:#111;

color:white;

display:flex;

align-items:center;

justify-content:center;

font-weight:600;

z-index:999;

box-shadow:0 2px 6px rgba(0,0,0,.5);

}


/* IFRAME */

iframe{

position:absolute;

top:55px;

left:0;

width:100vw;

height:calc(100vh - 55px);

border:none;

}


/* MOBILE */

@media(max-width:768px){

.brandbar{

height:50px;

font-size:14px;

}

iframe{

top:50px;

height:calc(100vh - 50px);

}

}

</style>

</head>



<body>


<!-- COMPANY BRAND -->

<div class="brandbar">

Dealer Auction Portal

</div>



<!-- YOUR APPS SCRIPT PORTAL -->

<iframe

src="https://script.google.com/macros/s/AKfycbzO9b6kRCVJFAZrRSWXuiDygekb_mMZS4CZGwmt8o57Ik5eh5gvlnLDEC2P1lRnmMTE/exec"

allowfullscreen>

</iframe>



</body>

</html>
