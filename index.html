<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Dealer Auction Portal</title>

<style>

/* PAGE RESET */

body{
margin:0;
background:#364586;
font-family:Arial;
overflow:hidden;
}

/* TOP BRAND BAR */

.brandbar{
position:fixed;
top:0;
left:0;
width:100%;
height:55px;
background:#364586;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
z-index:999;
box-shadow:0 2px 6px rgba(0,0,0,.5);
}

/* BOTTOM BRAND BAR */

.footerbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:55px;
background:#364586;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
z-index:999;
box-shadow:0 -2px 6px rgba(0,0,0,.5);
}

/* IFRAME */

iframe{
position:absolute;
top:55px;
left:0;
width:100vw;
height:calc(100vh - 110px);
border:none;
}

<div id="logoutOverlay"
  style="
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    font-family:Arial;
    font-size:18px;
    z-index:2000;
    opacity:0;
    pointer-events:none;
    transition:opacity .4s ease;
  ">

  <div style="
      width:45px;
      height:45px;
      border:4px solid rgba(255,255,255,0.3);
      border-top:4px solid white;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:15px;
  "></div>

  Logging out...

</div>

/* MOBILE */

@media(max-width:768px){

.brandbar{
height:50px;
font-size:14px;
}

.footerbar{
height:50px;
font-size:13px;
}

iframe{
top:50px;
height:calc(100vh - 100px);
}

}

@keyframes spin {
  to { transform: rotate(360deg); }
}
  
</style>

</head>

<body>

<!-- TOP BAR -->

<div class="brandbar">
  <span>Dealer Auction Portal</span>

  <button id="logoutBtn"
    style="
      position:absolute;
      right:15px;
      background:white;
      color:#364586;
      border:none;
      padding:6px 12px;
      border-radius:6px;
      font-size:13px;
      cursor:pointer;
      z-index:1001;
    ">
    Logout
  </button>
</div>

<!-- APPS SCRIPT PORTAL -->

<iframe
src="https://script.google.com/macros/s/AKfycbzO9b6kRCVJFAZrRSWXuiDygekb_mMZS4CZGwmt8o57Ik5eh5gvlnLDEC2P1lRnmMTE/exec"
allowfullscreen>
</iframe>

<!-- BOTTOM BAR -->

<div class="footerbar">
© 2026 Dealer Auction Platform | Secure Dealer Environment
</div>

<script>
function logoutFromPortal(){

  const iframe = document.querySelector("iframe");

  // Reload iframe (this resets Apps Script session)
  iframe.src = iframe.src;

}
</script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const btn = document.getElementById("logoutBtn");
  const overlay = document.getElementById("logoutOverlay");
  const iframe = document.querySelector("iframe");

  btn.addEventListener("click", function(){

    // Disable button
    btn.disabled = true;
    btn.style.opacity = "0.7";

    // Show animation
    overlay.style.opacity = "1";
    overlay.style.pointerEvents = "all";

    // Wait for animation effect
    setTimeout(function(){

      iframe.contentWindow.location.reload(true);

      // Hide overlay after reload delay
      setTimeout(function(){
        overlay.style.opacity = "0";
        overlay.style.pointerEvents = "none";
        btn.disabled = false;
        btn.style.opacity = "1";
      }, 1200);

    }, 500);

  });

});
</script>
</body>
</html>
